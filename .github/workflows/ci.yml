name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run the synthetic Python suite
        # pyproject addopts already excludes the `stormlib` + `client` markers (native / real-client
        # acceptance tiers), which are run locally against a real Ascension install, never in CI.
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm --prefix coa_scraper ci

      - name: Run the Node suite
        run: npm --prefix coa_scraper run unit-test
